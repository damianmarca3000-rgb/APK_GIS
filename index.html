<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro - Editor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body, html { margin:0; padding:0; height: 100%; font-family: sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        #panel { height: 60px; display: flex; gap: 5px; padding: 5px; background: #eee; align-items: center; }
        #sidebar { position:fixed; top:60px; right:-260px; width:260px; height:100%; background:white; z-index:999; transition:0.3s; padding:10px; box-shadow:-2px 0 5px #ccc; overflow-y: auto; }
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; }
        .form-box { background:white; padding:20px; border-radius:10px; width:90%; max-width:300px; }
        input { display:block; width:90%; margin:10px 0; padding:10px; }
        .list-item { border-bottom:1px solid #ddd; padding:10px 0; display:flex; justify-content:space-between; }
    </style>
</head>
<body>

    <div id="panel">
        <button onclick="document.getElementById('importInput').click()">📂 IMP</button>
        <button onclick="descargarKML()">💾 EXP</button>
        <button onclick="document.getElementById('sidebar').style.right = '0'">📋 LISTA</button>
    </div>
    <div id="map"></div>

    <div id="sidebar">
        <h3>Trazos Guardados</h3>
        <button onclick="document.getElementById('sidebar').style.right = '-260px'">CERRAR</button>
        <div id="lista-trazos"></div>
    </div>

    <div id="form-overlay">
        <div class="form-box">
            <h3 id="form-title">Detalles del Trazo</h3>
            <input type="text" id="codRuta" placeholder="Código de Ruta">
            <input type="text" id="numSerie" placeholder="N° Serie">
            <input type="text" id="fases" placeholder="Fases (A,B,C)">
            <button onclick="guardarDatos()">GUARDAR</button>
        </div>
    </div>

    <input type="file" id="importInput" accept=".kml,.kmz" style="display:none">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);
        
        // Habilitar edición y dibujo
        var drawControl = new L.Control.Draw({ 
            edit: { featureGroup: drawnItems }, 
            draw: { polygon: true, polyline: true, marker: true } 
        }).addTo(map);

        let activeLayer;

        map.on('draw:created', (e) => {
            activeLayer = e.layer;
            limpiarFormulario();
            document.getElementById('form-overlay').style.display = 'flex';
        });

        function limpiarFormulario() {
            document.getElementById('codRuta').value = activeLayer.myData?.codigo || "";
            document.getElementById('numSerie').value = activeLayer.myData?.serie || "";
            document.getElementById('fases').value = activeLayer.myData?.fases || "";
        }

        function guardarDatos() {
            activeLayer.myData = {
                codigo: document.getElementById('codRuta').value,
                serie: document.getElementById('numSerie').value,
                fases: document.getElementById('fases').value
            };
            if(!drawnItems.hasLayer(activeLayer)) drawnItems.addLayer(activeLayer);
            actualizarLista();
            document.getElementById('form-overlay').style.display = 'none';
        }

        function actualizarLista() {
            const container = document.getElementById('lista-trazos');
            container.innerHTML = '';
            drawnItems.eachLayer((layer) => {
                let div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span>${layer.myData?.codigo || 'Sin nombre'}</span>
                    <div>
                        <button onclick="editarTrazo(${L.stamp(layer)})">✏️</button>
                        <button onclick="enfocar(${L.stamp(layer)})">📍</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function editarTrazo(id) {
            activeLayer = drawnItems.getLayer(id);
            limpiarFormulario();
            document.getElementById('form-overlay').style.display = 'flex';
        }

        function enfocar(id) {
            let layer = drawnItems.getLayer(id);
            map.fitBounds(layer.getBounds ? layer.getBounds() : L.latLngBounds(layer.getLatLng(), layer.getLatLng()));
            document.getElementById('sidebar').style.right = '-260px';
        }

        function descargarKML() { /* Misma función de exportación anterior */ }
    </script>
</body>
</html>
