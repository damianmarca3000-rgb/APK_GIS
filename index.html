<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro - GIS Compatible</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body, html { margin:0; padding:0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: calc(100vh - 110px); width: 100%; }
        #panel { height: auto; display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; background: #eee; z-index: 1000; }
        button { flex: 1 1 40%; min-height: 45px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 12px; }
        .btn-loc { background: #007bff; }
        .btn-kml { background: #dc3545; }
        .btn-imp { background: #e67e22; }
    </style>
</head>
<body>

    <div id="panel">
        <button class="btn-loc" onclick="map.locate({setView: true})">📍 UBICAR</button>
        <button class="btn-imp" onclick="document.getElementById('importInput').click()">📂 IMPORTAR KMZ/KML</button>
        <button class="btn-kml" onclick="descargarKML()">💾 EXPORTAR ARCMAP</button>
        <input type="file" id="importInput" accept=".kml,.kmz" style="display:none" onchange="procesarArchivo(event)">
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        // Importación robusta
        async function procesarArchivo(e) {
            const file = e.target.files[0];
            if (!file) return;
            try {
                let kmlString = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const zip = await JSZip.loadAsync(file);
                    const kmlFile = Object.values(zip.files).find(f => f.name.toLowerCase().endsWith('.kml'));
                    kmlString = await kmlFile.async("string");
                } else {
                    kmlString = await file.text();
                }
                const geojson = toGeoJSON.kml(new DOMParser().parseFromString(kmlString, 'text/xml'));
                L.geoJSON(geojson, { onEachFeature: (f, l) => { l.myData = {foto: f.properties.description}; drawnItems.addLayer(l); } }).addTo(map);
                alert("✅ Cargado correctamente.");
            } catch (err) { alert("Error: " + err.message); }
        }

        // Exportación compatible con ArcMap
        function descargarKML() {
            let placemarks = "";
            drawnItems.eachLayer(l => {
                let img = l.myData?.foto || "Sin imagen";
                let geom = "";
                if (l instanceof L.Marker) {
                    geom = `<Point><coordinates>${l.getLatLng().lng},${l.getLatLng().lat},0</coordinates></Point>`;
                } else if (l instanceof L.Polygon) {
                    geom = `<Polygon><outerBoundaryIs><LinearRing><coordinates>${l.getLatLngs()[0].map(p => `${p.lng},${p.lat},0`).join(" ")}</coordinates></LinearRing></outerBoundaryIs></Polygon>`;
                } else if (l instanceof L.Polyline) {
                    geom = `<LineString><coordinates>${l.getLatLngs().map(p => `${p.lng},${p.lat},0`).join(" ")}</coordinates></LineString>`;
                }
                placemarks += `
                <Placemark>
                    <ExtendedData>
                        <Data name="Evidencia"><value><![CDATA[${img}]]></value></Data>
                    </ExtendedData>
                    ${geom}
                </Placemark>`;
            });

            const kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${placemarks}</Document></kml>`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
            a.download = "inspeccion_" + Date.now() + ".kml";
            a.click();
        }
    </script>
</body>
</html>
