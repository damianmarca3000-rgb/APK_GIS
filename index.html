<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electropuno Pro - GIS Profesional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { margin:0; display:flex; height:100vh; overflow:hidden; font-family: sans-serif; }
        #map { flex-grow:1; }
        .sidebar { width: 320px; background: #eee; padding: 15px; overflow-y: auto; border-right: 1px solid #ccc; }
        .dropdown { background: white; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        summary { padding: 10px; font-weight: bold; cursor: pointer; background: #e9ecef; }
        .item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .photo-preview { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Capas (TOC)</h3>
    
    <details class="dropdown" open>
        <summary>✏️ Dibujos (Trazos)</summary>
        <div id="lista-dibujos"></div>
    </details>

    <details class="dropdown" open>
        <summary>📂 Archivos KMZ/KML</summary>
        <div id="lista-kmz"></div>
    </details>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map').setView([-15.48, -70.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // Contenedores de capas
    const groupDibujos = L.featureGroup().addTo(map);
    const groupKMZ = L.featureGroup().addTo(map);

    new L.Control.Draw({ 
        edit: { featureGroup: groupDibujos }, 
        draw: { marker: true, polyline: true, polygon: true } 
    }).addTo(map);

    // Renderizado del TOC (Table of Contents)
    function renderTOC() {
        const listDibujos = document.getElementById('lista-dibujos');
        listDibujos.innerHTML = '';
        
        groupDibujos.eachLayer(layer => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span>ID: ${layer._leaflet_id}</span> 
                             <button onclick="zoomToLayer(${layer._leaflet_id})">🔍</button>`;
            listDibujos.appendChild(div);
        });
    }

    function zoomToLayer(id) {
        const layer = groupDibujos.getLayer(id) || groupKMZ.getLayer(id);
        if (layer.getBounds) map.fitBounds(layer.getBounds());
        else map.setView(layer.getLatLng(), 18);
    }

    // Listener de dibujo
    map.on('draw:created', (e) => {
        const layer = e.layer;
        layer.addTo(groupDibujos);
        // Aquí dispararías tu modal de registro de fotos
        renderTOC();
    });

    // Ejemplo de cómo organizar importación por grupos
    function importarKMZ(files) {
        // ... (Lógica de JSZip aquí)
        // Al terminar, añades la capa al groupKMZ y llamas a renderTOC()
    }
</script>
</body>
</html>
