<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electropuno Pro - Captura GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        body, html { margin:0; padding:0; height: 100%; font-family: sans-serif; }
        #app-container { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #f4f4f4; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        #map { flex-grow: 1; }
        #lista-registros { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .reg-item { background: white; margin-bottom: 5px; padding: 8px; border: 1px solid #ddd; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .form-box { background:white; padding:15px; border-radius:10px; width:95%; max-width:400px; max-height:90vh; overflow-y:auto; }
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <div style="padding:10px; background:#333; color:white;">
            <b>Gestión de Tramos</b>
            <select id="sortSelector" onchange="renderLista()" style="width:100%; margin-top:5px;">
                <option value="fecha">Ordenar por Fecha</option>
                <option value="serie">Ordenar por Serie</option>
            </select>
        </div>
        <div id="lista-registros"></div>
        <button onclick="exportarSeleccionados()" style="padding:15px; background:#28a745; color:white; border:none; cursor:pointer;">EXPORTAR SELECCIONADOS (KMZ)</button>
    </div>
    <div id="map"></div>
</div>

<div id="form-overlay">
    <div class="form-box">
        <h3>Registro de Red</h3>
        <input type="text" id="codRuta" placeholder="Código de Ruta">
        <input type="text" id="numSerie" placeholder="N° Serie">
        <input type="text" id="fases" placeholder="Fases (A,B,C)">
        <button class="photo-btn" onclick="tomarFoto(0)">📸 FOTO CÓDIGO</button>
        <button class="photo-btn" onclick="tomarFoto(1)">📸 FOTO SERIE</button>
        <button class="photo-btn" onclick="tomarFoto(2)">📸 FOTO PANORÁMICA</button>
        <input type="file" id="camaraInput" accept="image/*" capture="environment" style="display:none" onchange="procesarImagen(event)">
        <button onclick="guardarDatos()" style="margin-top:15px; width:100%; background:#007bff; color:white; padding:12px; border:none;">GUARDAR</button>
    </div>
</div>

<script>
    proj4.defs("EPSG:32719","+proj=utm +zone=19 +south +datum=WGS84 +units=m +no_defs");
    var map = L.map('map').setView([-15.48, -70.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var drawnItems = new L.FeatureGroup().addTo(map);
    map.addLayer(drawnItems);
    new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

    let activeLayer, fotosData = [null, null, null];

    map.on('draw:created', (e) => {
        activeLayer = e.layer;
        fotosData = [null, null, null];
        document.getElementById('form-overlay').style.display = 'flex';
    });

    function renderLista() {
        const container = document.getElementById('lista-registros');
        container.innerHTML = "";
        let layers = [];
        drawnItems.eachLayer(l => { if(l.myData) layers.push(l); });

        const criterio = document.getElementById('sortSelector').value;
        layers.sort((a,b) => (a.myData[criterio] > b.myData[criterio] ? 1 : -1));

        layers.forEach((l, index) => {
            const div = document.createElement('div');
            div.className = 'reg-item';
            div.innerHTML = `<input type="checkbox" class="chk-export" data-idx="${index}" checked> Serie: ${l.myData.serie} (${l.myData.fecha.split(' ')[0]})`;
            container.appendChild(div);
            l.listIndex = index; // Referencia
        });
    }

    function guardarDatos() {
        activeLayer.myData = {
            codigo: document.getElementById('codRuta').value,
            serie: document.getElementById('numSerie').value,
            fases: document.getElementById('fases').value,
            fecha: new Date().toLocaleString(),
            fotos: fotosData
        };
        drawnItems.addLayer(activeLayer);
        renderLista();
        document.getElementById('form-overlay').style.display = 'none';
    }

    async function exportarSeleccionados() {
        const zip = new JSZip();
        let csv = "Codigo,Serie,Fases,Fecha,NombreArchivo\n";
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
        
        document.querySelectorAll('.chk-export:checked').forEach(chk => {
            let idx = chk.getAttribute('data-idx');
            drawnItems.eachLayer(l => {
                if(l.myData && l.listIndex == idx) {
                    // (Lógica de kml/csv igual a la anterior)
                    let d = l.myData;
                    kml += `<Placemark><name>${d.serie}</name><Point><coordinates>${l.getLatLng().lng},${l.getLatLng().lat}</coordinates></Point></Placemark>`;
                    d.fotos.forEach((f, i) => { 
                        let name = `${d.serie}_${i}.jpg`;
                        zip.file(name, f.split(',')[1], {base64: true});
                        csv += `${d.codigo},${d.serie},${d.fases},${d.fecha},${name}\n`;
                    });
                }
            });
        });

        kml += `</Document></kml>`;
        zip.file("doc.kml", kml);
        zip.file("Reporte.csv", csv);
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(content); a.download = "Exportacion.kmz"; a.click();
    }
    
    // Funciones de fotos omitidas por brevedad (usa las mismas que tenías)
    function tomarFoto(i) { currentFotoIndex = i; document.getElementById('camaraInput').click(); }
</script>
</body>
</html>
