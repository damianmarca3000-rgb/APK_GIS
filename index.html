<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electropuno Pro - Exportación Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    </head>
<body>
    <script>
        async function exportarTodo() {
            const zip = new JSZip();
            const fecha = new Date().toISOString().slice(0,10);
            
            // 1. Generar Contenido CSV
            let csvContenido = "Codigo,Serie,Fases,NombreArchivo\n";
            
            // 2. Generar Contenido KML
            let placemarks = "";
            
            drawnItems.eachLayer(l => {
                let d = l.myData || {codigo:'N/A', serie:'S/N', fases:'N/A', fotoNombre:'', foto:''};
                
                // Agregar al CSV
                csvContenido += `${d.codigo},${d.serie},${d.fases},${d.fotoNombre}\n`;
                
                // Agregar al KML con enlace a la foto (ExtendedData)
                placemarks += `
                <Placemark>
                    <name>${d.codigo}</name>
                    <ExtendedData>
                        <Data name="Foto"><value>${d.fotoNombre}</value></Data>
                    </ExtendedData>
                    <Point><coordinates>${l.getLatLng().lng},${l.getLatLng().lat}</coordinates></Point>
                </Placemark>`;

                // 3. Añadir la imagen REAL al ZIP
                if (d.foto) {
                    // Convertir base64 a binario para el ZIP
                    let base64Data = d.foto.split(',')[1];
                    zip.file(d.fotoNombre, base64Data, {base64: true});
                }
            });

            // 4. Finalizar archivos en el ZIP
            zip.file(`Electropuno_${fecha}.csv`, csvContenido);
            zip.file(`Electropuno_${fecha}.kml`, `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${placemarks}</Document></kml>`);

            // 5. Descargar el ZIP
            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Electropuno_Proyecto_${fecha}.zip`;
            a.click();
        }
    </script>
</body>
</html>
