<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Móvil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { margin:0; padding:0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #map { flex: 1; width: 100%; }
        #panel { height: 150px; background: #fff; padding: 10px; box-shadow: 0 -2px 5px rgba(0,0,0,0.2); z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        button { padding: 15px; font-size: 16px; border: none; border-radius: 8px; background: #28a745; color: white; font-weight: bold; }
        .info { font-size: 12px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <button onclick="descargarGeoJSON()">💾 GUARDAR Y EXPORTAR TRAZOS</button>
        <div class="info">Toca el icono de lápiz en el mapa para dibujar.<br>Al terminar, pulsa el botón para descargar el archivo .geojson.</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Capa WMS (Asegúrate de tener conexión a la red de Electropuno)
        L.tileLayer.wms("http://192.168.236.107/arcgis/services/Redes/MapServer/WmsServer", {
            layers: '0', format: 'image/png', transparent: true
        }).addTo(map);

        var drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ 
            edit: { featureGroup: drawnItems }, 
            draw: { polygon: true, polyline: true, marker: true } 
        }).addTo(map);

        function descargarGeoJSON() {
            let features = [];
            drawnItems.eachLayer(layer => features.push(layer.toGeoJSON()));

            if (features.length === 0) {
                alert("Primero dibuja algo en el mapa.");
                return;
            }

            const data = JSON.stringify({type: "FeatureCollection", features: features});
            const blob = new Blob([data], {type: "application/json"});
            
            // Forzar descarga amigable para móvil
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "inspeccion_" + new Date().toLocaleDateString() + ".geojson";
            a.click();
        }

        // Auto-ubicación al iniciar
        map.locate({setView: true, maxZoom: 17});
    </script>
</body>
</html>
