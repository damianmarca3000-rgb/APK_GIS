<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Campo Electropuno</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body, #map { height: 100vh; width: 100vw; margin: 0; }
        .controls { position: absolute; bottom: 20px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        button { padding: 12px; background: white; border: 1px solid #444; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <button onclick="irAUbicacion()">📍 Mi Ubicación</button>
        <button onclick="descargarData()">💾 Exportar GeoJSON</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true } }).addTo(map);

        // 1. Geolocalización GPS
        function irAUbicacion() {
            map.locate({setView: true, maxZoom: 18});
        }
        map.on('locationfound', function(e) {
            L.marker(e.latlng).addTo(map).bindPopup("¡Estás aquí!").openPopup();
        });

        // 2. Ventana emergente (Popup) al terminar de dibujar
        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            var popupContent = `
                <div>
                    <h4>Editar Inspección</h4>
                    <input type="text" id="nota" placeholder="Nota del tramo"><br><br>
                    <input type="file" accept="image/*" capture="environment"><br><br>
                    <button onclick="guardarInfo()">Guardar Datos</button>
                </div>
            `;
            layer.bindPopup(popupContent).openPopup();
            drawnItems.addLayer(layer);
        });

        function guardarInfo() { alert("Datos guardados temporalmente en memoria."); }

        function descargarData() {
            var data = JSON.stringify(drawnItems.toGeoJSON());
            var blob = new Blob([data], {type: "application/json"});
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "inspeccion_campo.geojson";
            a.click();
        }
    </script>
</body>
</html>
