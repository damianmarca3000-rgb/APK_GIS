<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
</head>
<body>

    <style>
        body, html { margin:0; padding:0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: 80vh; width: 100%; }
        #panel { height: 20vh; display: flex; flex-wrap: wrap; gap: 5px; padding: 5px; background: #eee; }
        button { flex: 1 1 40%; min-height: 40px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-loc { background: #007bff; }
        .btn-kml { background: #dc3545; }
        .btn-imp { background: #e67e22; }
        .btn-list { background: #6c757d; }
    </style>

    <div id="panel">
        <button class="btn-list" onclick="toggleSidebar()">📋 LISTA</button>
        <button class="btn-loc" onclick="map.locate({setView: true, maxZoom: 18})">📍 UBICAR</button>
        <button class="btn-imp" onclick="document.getElementById('importInput').click()">📂 IMPORTAR</button>
        <button class="btn-kml" onclick="descargarKML()">💾 EXPORTAR</button>
        <input type="file" id="importInput" accept=".kml" style="display:none" onchange="importarKML(event)">
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <script>
        // Inicializar mapa
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Capa de dibujo
        var drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ 
            edit: { featureGroup: drawnItems }, 
            draw: { polygon: true, polyline: true, marker: true } 
        }).addTo(map);

        // Funciones (Exportar, Importar, etc.)
        function descargarKML() {
            if(drawnItems.getLayers().length === 0) return alert("Nada que exportar");
            let placemarks = "";
            drawnItems.eachLayer(l => {
                let img = l.myData?.foto || "";
                let coords = l.getLatLng ? `${l.getLatLng().lng},${l.getLatLng().lat},0` : l.getLatLngs()[0].map(p => `${p.lng},${p.lat},0`).join(" ");
                placemarks += `<Placemark><description><![CDATA[<img src="${img}" width="300px" />]]></description><Point><coordinates>${coords}</coordinates></Point></Placemark>`;
            });
            const kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${placemarks}</Document></kml>`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
            a.download = "export_" + Date.now() + ".kml";
            a.click();
        }

        function importarKML(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const geojson = toGeoJSON.kml(new DOMParser().parseFromString(ev.target.result, 'text/xml'));
                L.geoJSON(geojson, {
                    onEachFeature: (f, l) => { l.myData = {foto: f.properties.description}; drawnItems.addLayer(l); }
                }).addTo(map);
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
