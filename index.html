<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electropuno Pro - Captura GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        body, html { margin:0; padding:0; height: 100%; font-family: sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        #panel { height: 60px; display: flex; gap: 10px; padding: 10px; background: #333; align-items: center; color: white;}
        .form-box { background:white; padding:15px; border-radius:10px; width:95%; max-width:400px; max-height:90vh; overflow-y:auto; }
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; }
        input { display:block; width:90%; margin:5px 0; padding:8px; }
        .photo-btn { width:100%; padding:10px; margin:5px 0; background:#f0f0f0; border:1px solid #ccc; cursor:pointer; }
    </style>
</head>
<body>

    <div id="panel">
        <button onclick="exportarSeleccionados()" style="background:#28a745; color:white; border:none; padding:10px;">💾 EXPORTAR ZIP</button>
        <span>Electropuno GIS</span>
    </div>
    <div id="map"></div>

    <div id="form-overlay">
        <div class="form-box">
            <h3>Registro de Red</h3>
            <input type="text" id="codRuta" placeholder="Código de Ruta">
            <input type="text" id="numSerie" placeholder="N° Serie">
            <input type="text" id="fases" placeholder="Fases (A,B,C)">
            
            <p style="font-size:0.8em; color:gray;">Debe tomar estas 3 fotos obligatoriamente:</p>
            <button class="photo-btn" onclick="tomarFoto(0)">📸 1. FOTO CÓDIGO</button>
            <button class="photo-btn" onclick="tomarFoto(1)">📸 2. FOTO SERIE</button>
            <button class="photo-btn" onclick="tomarFoto(2)">📸 3. FOTO PANORÁMICA</button>
            
            <input type="file" id="camaraInput" accept="image/*" capture="environment" style="display:none" onchange="procesarImagen(event)">
            <div id="preview-container" style="display:flex; gap:5px; margin-top:10px;"></div>
            
            <button onclick="guardarDatos()" style="margin-top:15px; width:100%; background:#007bff; color:white; padding:12px; border:none;">GUARDAR REGISTRO</button>
        </div>
    </div>

    <script>
        proj4.defs("EPSG:32719","+proj=utm +zone=19 +south +datum=WGS84 +units=m +no_defs");
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        let activeLayer, currentFotoIndex = 0;
        let fotosData = [null, null, null]; // [Codigo, Serie, Panoramica]

        map.on('draw:created', (e) => {
            activeLayer = e.layer;
            fotosData = [null, null, null];
            document.getElementById('preview-container').innerHTML = '';
            document.getElementById('form-overlay').style.display = 'flex';
        });

        function tomarFoto(index) {
            currentFotoIndex = index;
            document.getElementById('camaraInput').click();
        }

        async function procesarImagen(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const pos = await new Promise(r => navigator.geolocation.getCurrentPosition(pos => r(pos.coords), () => r({latitude:0, longitude:0})));
            const utm = proj4("EPSG:4326", "EPSG:32719", [pos.longitude, pos.latitude]);
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    ctx.font = "bold 80px Arial"; ctx.fillStyle = "red";
                    ctx.fillText(`E:${utm[0].toFixed(0)} N:${utm[1].toFixed(0)}`, 100, 150);
                    
                    fotosData[currentFotoIndex] = canvas.toDataURL('image/jpeg');
                    actualizarPreview();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function actualizarPreview() {
            const cont = document.getElementById('preview-container');
            cont.innerHTML = '';
            fotosData.forEach((f, i) => {
                if(f) {
                    const img = document.createElement('img');
                    img.src = f; img.style.width = "60px";
                    cont.appendChild(img);
                }
            });
        }

        async function guardarDatos() {
            if(fotosData.includes(null)) { alert("Debes tomar las 3 fotos obligatorias"); return; }
            const utm = await new Promise(r => navigator.geolocation.getCurrentPosition(pos => r(proj4("EPSG:4326", "EPSG:32719", [pos.coords.longitude, pos.coords.latitude])), () => r([0,0])));
            
            activeLayer.myData = {
                codigo: document.getElementById('codRuta').value,
                serie: document.getElementById('numSerie').value,
                fases: document.getElementById('fases').value,
                fecha: new Date().toLocaleString(),
                e: utm[0].toFixed(0), n: utm[1].toFixed(0),
                fotos: fotosData
            };
            if(!drawnItems.hasLayer(activeLayer)) drawnItems.addLayer(activeLayer);
            document.getElementById('form-overlay').style.display = 'none';
        }

        async function exportarSeleccionados() {
            const zip = new JSZip();
            let csv = "Codigo,Serie,Fases,Fecha,Este,Norte,NombreArchivo\n";
            const etiquetas = ["CODIGO", "SERIE", "PANORAMICA"];
            
            drawnItems.eachLayer((l) => {
                let d = l.myData;
                if (!d) return;
                d.fotos.forEach((f, i) => {
                    let nombre = `${d.serie}_${etiquetas[i]}_E${d.e}_N${d.n}.jpg`;
                    zip.file(nombre, f.split(',')[1], {base64: true});
                    csv += `${d.codigo},${d.serie},${d.fases},${d.fecha},${d.e},${d.n},${nombre}\n`;
                });
            });
            zip.file("Reporte_Electropuno.csv", csv);
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = "Captura_GIS_Final.zip";
            a.click();
        }
    </script>
</body>
</html>
