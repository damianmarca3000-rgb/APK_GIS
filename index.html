<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body, html { margin:0; padding:0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: calc(100vh - 80px); width: 100%; }
        #panel { height: 80px; display: flex; gap: 5px; padding: 5px; background: #eee; }
        button { flex: 1; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; }
        .btn-loc { background: #007bff; }
        .btn-exp { background: #28a745; }
        /* Capa transparente de captura */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; color: white; flex-direction: column; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <button class="btn-loc" onclick="map.locate({setView: true, maxZoom: 18})">📍 UBICAR</button>
        <button class="btn-exp" onclick="descargarGeoJSON()">💾 EXPORTAR</button>
    </div>

    <div id="photo-overlay">
        <h3>Capturar Evidencia</h3>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        <button id="btnTrigger" style="padding: 20px; background: #ffc107; color: black;">📸 ABRIR CÁMARA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        var map = L.map('map', { tap: true }).setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        L.tileLayer.wms("http://192.168.236.107/arcgis/services/Redes/MapServer/WmsServer", {
            layers: '0', format: 'image/png', transparent: true
        }).addTo(map);

        var drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        let currentLayer = null;

        map.on(L.Draw.Event.CREATED, function (e) {
            currentLayer = e.layer;
            currentLayer.feature = { properties: { foto: null, fecha: new Date().toLocaleString() } };
            drawnItems.addLayer(currentLayer);
            
            // Mostrar la capa transparente para tomar la foto
            document.getElementById('photo-overlay').style.display = 'flex';
        });

        document.getElementById('btnTrigger').onclick = () => document.getElementById('cameraInput').click();

        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentLayer.feature.properties.foto = event.target.result;
                    document.getElementById('photo-overlay').style.display = 'none';
                    alert("✅ Foto capturada y vinculada.");
                };
                reader.readAsDataURL(file);
            }
        };

        function descargarGeoJSON() {
            let features = [];
            drawnItems.eachLayer(l => {
                let g = l.toGeoJSON();
                g.properties = l.feature.properties;
                features.push(g);
            });
            if (features.length === 0) return alert("Dibuja algo primero");
            
            const data = JSON.stringify({type: "FeatureCollection", features: features});
            const blob = new Blob([data], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Electropuno_" + new Date().getTime() + ".geojson";
            a.click();
        }
    </script>
</body>
</html>
