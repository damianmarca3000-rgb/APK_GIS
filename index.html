<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electropuno Pro - Captura</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body, html { margin:0; padding:0; height: 100%; overflow: hidden; }
        #map { height: calc(100vh - 60px); width: 100%; }
        #panel { height: 60px; display: flex; gap: 5px; padding: 10px; background: #eee; }
        /* Formulario Overlay */
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; }
        .form-box { background:white; padding:20px; border-radius:10px; width:80%; max-width:400px; }
        input { display:block; width:100%; margin:10px 0; padding:10px; }
    </style>
</head>
<body>

    <div id="panel">
        <button onclick="document.getElementById('importInput').click()">📂 IMPORTAR</button>
        <button onclick="descargarKML()">💾 EXPORTAR</button>
        <input type="file" id="importInput" accept=".kml,.kmz" style="display:none" onchange="procesarArchivo(event)">
    </div>
    
    <div id="map"></div>

    <div id="form-overlay">
        <div class="form-box">
            <h3>Detalles del Trazo</h3>
            <input type="text" id="codRuta" placeholder="Código de Ruta">
            <input type="text" id="numSerie" placeholder="Número de Serie">
            <input type="text" id="fases" placeholder="Fases (Ej: A,B,C)">
            <button onclick="guardarDatos()">GUARDAR</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        let tempLayer;

        map.on('draw:created', (e) => {
            tempLayer = e.layer;
            drawnItems.addLayer(tempLayer);
            document.getElementById('form-overlay').style.display = 'flex';
        });

        function guardarDatos() {
            tempLayer.myData = {
                codigo: document.getElementById('codRuta').value,
                serie: document.getElementById('numSerie').value,
                fases: document.getElementById('fases').value
            };
            document.getElementById('form-overlay').style.display = 'none';
        }

        // EXPORTACIÓN CON DATOS
        function descargarKML() {
            let placemarks = "";
            drawnItems.eachLayer(l => {
                let data = l.myData || {codigo:'N/A', serie:'N/A', fases:'N/A'};
                let geom = (l instanceof L.Marker) ? `<Point><coordinates>${l.getLatLng().lng},${l.getLatLng().lat},0</coordinates></Point>` : 
                           (l instanceof L.Polygon) ? `<Polygon><outerBoundaryIs><LinearRing><coordinates>${l.getLatLngs()[0].map(p => p.lng+','+p.lat+',0').join(" ")}</coordinates></LinearRing></outerBoundaryIs></Polygon>` :
                           `<LineString><coordinates>${l.getLatLngs().map(p => p.lng+','+p.lat+',0').join(" ")}</coordinates></LineString>`;
                
                placemarks += `<Placemark>
                    <ExtendedData>
                        <Data name="Ruta"><value>${data.codigo}</value></Data>
                        <Data name="Serie"><value>${data.serie}</value></Data>
                        <Data name="Fases"><value>${data.fases}</value></Data>
                    </ExtendedData>${geom}</Placemark>`;
            });

            const kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${placemarks}</Document></kml>`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
            a.download = "inspeccion_" + Date.now() + ".kml";
            a.click();
        }

        async function procesarArchivo(e) { /* ... misma función anterior ... */ }
    </script>
</body>
</html>
