<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electropuno Pro - Captura GIS UTM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        body, html { margin:0; padding:0; height: 100%; font-family: sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        #panel { height: 60px; display: flex; gap: 10px; padding: 10px; background: #333; align-items: center; color: white;}
        .form-box { background:white; padding:20px; border-radius:10px; width:90%; max-width:350px; }
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; overflow-y:auto; }
        input { display:block; width:90%; margin:10px 0; padding:10px; }
        #preview-container { display:flex; gap:5px; margin-top:10px; }
    </style>
</head>
<body>

    <div id="panel">
        <button onclick="exportarSeleccionados()" style="background:#28a745; color:white; padding:10px;">💾 EXPORTAR ZIP</button>
        <span>Electropuno GIS (UTM Zona 19S)</span>
    </div>
    <div id="map"></div>

    <div id="form-overlay">
        <div class="form-box">
            <h3>Detalles</h3>
            <input type="text" id="codRuta" placeholder="Código de Ruta">
            <input type="text" id="numSerie" placeholder="N° Serie">
            <input type="text" id="fases" placeholder="Fases (A,B,C)">
            <button onclick="document.getElementById('camaraInput').click()" style="width:100%">📸 TOMAR FOTOS</button>
            <input type="file" id="camaraInput" accept="image/*" capture="environment" multiple style="display:none" onchange="procesarImagenes(event)">
            <div id="preview-container"></div>
            <button onclick="guardarDatos()" style="margin-top:15px; width:100%; background:#007bff; color:white; padding:10px;">GUARDAR DATOS</button>
        </div>
    </div>

    <script>
        // Definición de Zona UTM 19S para Puno
        proj4.defs("EPSG:32719","+proj=utm +zone=19 +south +datum=WGS84 +units=m +no_defs");

        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        let activeLayer, fotosArray = [];

        function obtenerUTM() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // Convertir Lat/Lon a UTM
                        let utm = proj4("EPSG:4326", "EPSG:32719", [pos.coords.longitude, pos.coords.latitude]);
                        resolve({e: utm[0].toFixed(2), n: utm[1].toFixed(2)});
                    },
                    () => resolve({e: 0, n: 0})
                );
            });
        }

        async function procesarImagenes(e) {
            const files = Array.from(e.target.files).slice(0, 3);
            const utm = await obtenerUTM();
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            fotosArray = [];

            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        ctx.font = "bold 80px Arial"; ctx.fillStyle = "red";
                        ctx.fillText(`E:${utm.e} N:${utm.n}`, 100, 150);
                        
                        const b64 = canvas.toDataURL('image/jpeg');
                        fotosArray.push(b64);
                        const prev = document.createElement('img');
                        prev.src = b64; prev.style.width = "80px";
                        container.appendChild(prev);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function guardarDatos() {
            const utm = await obtenerUTM();
            activeLayer.myData = {
                codigo: document.getElementById('codRuta').value,
                serie: document.getElementById('numSerie').value || 'SN',
                fases: document.getElementById('fases').value,
                fecha: new Date().toLocaleString(),
                e: utm.e, n: utm.n,
                fotos: fotosArray
            };
            if(!drawnItems.hasLayer(activeLayer)) drawnItems.addLayer(activeLayer);
            document.getElementById('form-overlay').style.display = 'none';
        }

        async function exportarSeleccionados() {
            const zip = new JSZip();
            let csv = "Codigo,Serie,Fases,Fecha,Este,Norte,NombreArchivo\n";
            
            drawnItems.eachLayer((l) => {
                let d = l.myData;
                if (!d) return;

                d.fotos.forEach((f, i) => {
                    let nombre = `${d.serie}_E${d.e}_N${d.n}_${i+1}.jpg`;
                    zip.file(nombre, f.split(',')[1], {base64: true});
                    csv += `${d.codigo},${d.serie},${d.fases},${d.fecha},${d.e},${d.n},${nombre}\n`;
                });
            });

            zip.file("Reporte_Electropuno.csv", csv);
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = "Captura_GIS_UTM.zip";
            a.click();
        }
    </script>
</body>
</html>
