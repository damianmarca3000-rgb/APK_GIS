<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Electropuno Pro GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body, html { margin:0; padding:0; height: 100%; font-family: sans-serif; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        #sidebar { height: 30vh; overflow-y: auto; background: #f8f9fa; border-bottom: 2px solid #ccc; }
        #map { flex-grow: 1; z-index: 1; }
        .reg-item { padding: 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; font-size: 16px; background: white; }
        .btn-gps { position: absolute; top: 80px; left: 10px; z-index: 1000; padding: 15px; background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.3); font-size: 20px; }
        .btn-main { padding: 20px; font-size: 18px; background: #28a745; color: white; border: none; }
        .form-box { background:white; padding:20px; width:95%; max-width:500px; border-radius:15px; max-height: 90vh; overflow-y: auto; }
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; }
        .foto-prev { width: 80px; height: 80px; object-fit: cover; border: 2px solid #ddd; margin: 5px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <div style="padding:10px; background:#333; color:white;"><b>TRAMOS Y ACOMETIDAS</b></div>
        <div id="lista-registros"></div>
    </div>
    <div id="map">
        <button class="btn-gps" onclick="centrarGPS()">📍</button>
    </div>
    <button class="btn-main" onclick="exportarTodo()">📥 EXPORTAR ZIP (KMZ+CSV+FOTOS)</button>
</div>

<div id="form-overlay">
    <div class="form-box">
        <h3>Detalles del Elemento</h3>
        <input type="text" id="codRuta" placeholder="Código" style="width:100%; padding:15px; margin-bottom:10px;">
        <input type="text" id="numSerie" placeholder="Serie" style="width:100%; padding:15px; margin-bottom:10px;">
        
        <div id="area-fotos" style="display:flex; flex-wrap:wrap; margin-bottom:10px;"></div>
        <input type="file" id="fInput" accept="image/*" capture="environment" style="display:none" onchange="agregarFoto(event)">
        <button class="btn-main" style="background:#6c757d; width:100%; margin-bottom:10px;" onclick="document.getElementById('fInput').click()">📸 TOMAR FOTO</button>
        
        <button class="btn-main" style="background:#007bff; width:100%;" onclick="guardarDatos()">GUARDAR</button>
    </div>
</div>

<script>
    var map = L.map('map', {maxZoom: 22}).setView([-15.48, -70.13], 18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 22}).addTo(map);
    var drawnItems = new L.FeatureGroup().addTo(map);
    map.addLayer(drawnItems);
    new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

    let activeLayer, fotosGuardadas = [];

    map.on('draw:created', (e) => {
        activeLayer = e.layer;
        fotosGuardadas = [];
        document.getElementById('area-fotos').innerHTML = "";
        document.getElementById('form-overlay').style.display = 'flex';
    });

    function agregarFoto(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            fotosGuardadas.push(ev.target.result);
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'foto-prev';
            document.getElementById('area-fotos').appendChild(img);
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function guardarDatos() {
        activeLayer.myData = {
            codigo: document.getElementById('codRuta').value,
            serie: document.getElementById('numSerie').value,
            fecha: new Date().toLocaleString(),
            fotos: fotosGuardadas
        };
        drawnItems.addLayer(activeLayer);
        renderLista();
        document.getElementById('form-overlay').style.display = 'none';
    }

    function renderLista() {
        const container = document.getElementById('lista-registros');
        container.innerHTML = "";
        drawnItems.eachLayer((l) => {
            if(!l.myData) return;
            const div = document.createElement('div');
            div.className = 'reg-item';
            div.innerHTML = `<input type="checkbox" class="chk-export" data-id="${l._leaflet_id}" checked> 
                             <span style="margin-left:10px;"><b>${l.myData.serie}</b> - ${l.myData.codigo}</span>`;
            container.appendChild(div);
        });
    }

    async function exportarTodo() {
        const zip = new JSZip();
        let csv = "Codigo,Serie,Fecha\n";
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
        
        document.querySelectorAll('.chk-export:checked').forEach(chk => {
            let layer = drawnItems.getLayer(chk.getAttribute('data-id'));
            let d = layer.myData;
            kml += `<Placemark><name>${d.serie}</name><Point><coordinates>${layer.getLatLng().lng},${layer.getLatLng().lat}</coordinates></Point></Placemark>`;
            csv += `${d.codigo},${d.serie},${d.fecha}\n`;
            d.fotos.forEach((f, i) => zip.file(`${d.serie}_foto_${i}.jpg`, f.split(',')[1], {base64: true}));
        });

        zip.file("doc.kml", kml + `</Document></kml>`);
        zip.file("reporte.csv", csv);
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(content); a.download = "Electropuno_Data.zip"; a.click();
    }

    function centrarGPS() {
        map.locate({setView: true, maxZoom: 19});
        map.on('locationfound', (e) => { L.circle(e.latlng, 5).addTo(map); });
    }
</script>
</body>
</html>
