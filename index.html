<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electropuno Pro GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    <style>
        body { margin:0; display:flex; height:100vh; font-family: sans-serif; }
        #map { flex-grow:1; }
        .sidebar { width: 320px; background: #f8f9fa; padding: 15px; overflow-y: auto; border-right: 1px solid #ccc; z-index: 1000; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .form-card { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        .btn { padding: 10px; margin: 5px 0; width: 100%; border: none; border-radius: 5px; cursor: pointer; background: #004a99; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>TOC - Gestión de Capas</h3>
    <button class="btn" style="background:#28a745" onclick="exportarTodo()">💾 EXPORTAR ZIP COMPLETO</button>
    <hr>
    <details open><summary>✏️ Dibujos de Campo</summary><div id="lista-dibujos"></div></details>
</div>

<div id="map"></div>

<div id="modal" class="modal">
    <div class="form-card">
        <h3>Registrar Suministro</h3>
        <input type="text" id="m-ruta" placeholder="Código de Ruta" style="width:100%; padding:8px; margin:5px 0;">
        <input type="text" id="m-serie" placeholder="N° Serie" style="width:100%; padding:8px; margin:5px 0;">
        <button class="btn" onclick="escanear()">📷 Escanear Serie</button>
        <input type="file" id="m-fotos" multiple accept="image/*" capture="environment">
        <button class="btn" style="background:#28a745" onclick="guardarDatos()">GUARDAR Y CERRAR</button>
    </div>
</div>

<script>
    const map = L.map('map').setView([-15.48, -70.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const groupDibujos = L.featureGroup().addTo(map);
    new L.Control.Draw({ edit: { featureGroup: groupDibujos }, draw: { marker: true, polyline: true, polygon: true } }).addTo(map);

    let activeLayer;

    // 1. Trigger del formulario al terminar dibujo
    map.on(L.Draw.Event.CREATED, e => {
        activeLayer = e.layer;
        document.getElementById('modal').style.display = 'flex';
    });

    // 2. Guardar datos y fotos en el objeto
    async function guardarDatos() {
        const files = document.getElementById('m-fotos').files;
        activeLayer.myData = {
            ruta: document.getElementById('m-ruta').value,
            serie: document.getElementById('m-serie').value,
            fotos: await Promise.all(Array.from(files).map(f => toBase64(f)))
        };
        groupDibujos.addLayer(activeLayer);
        document.getElementById('modal').style.display = 'none';
        renderTOC();
    }

    // 3. Exportación Maestra (CSV + KMZ + Fotos)
    async function exportarTodo() {
        const zip = new JSZip();
        let csv = "Ruta,Serie,Lat,Lon\n";
        
        groupDibujos.eachLayer((l, index) => {
            const data = l.myData || {ruta:'-', serie:'-'};
            const pos = l.getLatLng ? l.getLatLng() : l.getBounds().getCenter();
            csv += `${data.ruta},${data.serie},${pos.lat},${pos.lng}\n`;
            
            // Agregar fotos al ZIP
            data.fotos?.forEach((f, i) => zip.file(`foto_${index}_${i}.jpg`, f.split(',')[1], {base64: true}));
        });
        
        zip.file("registros.csv", csv);
        const blob = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Electropuno_Export.zip";
        a.click();
    }

    function toBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    function renderTOC() {
        const list = document.getElementById('lista-dibujos');
        list.innerHTML = '';
        groupDibujos.eachLayer(l => {
            const div = document.createElement('div');
            div.className = 'btn';
            div.style.background = '#eee'; div.style.color = 'black';
            div.innerHTML = `Ruta: ${l.myData?.ruta || 'N/A'}`;
            list.appendChild(div);
        });
    }

    async function escanear() {
        const reader = new ZXing.BrowserMultiFormatReader();
        const res = await reader.decodeOnceFromVideoDevice(null);
        document.getElementById('m-serie').value = res.text;
    }
</script>
</body>
</html>
