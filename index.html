<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body, html { margin:0; padding:0; height:100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .toolbar { position: fixed; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 5px; }
        .btn { padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .sidebar { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding: 15px; box-shadow: -2px 0 5px rgba(0,0,0,0.3); overflow-y: auto; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" onclick="map.locate({setView: true, maxZoom: 16})">📍 GPS</button>
    <button class="btn" onclick="document.getElementById('sidebar').style.right='0'">📋 LISTA</button>
    <button class="btn" onclick="exportData()" style="background:#28a745;">💾 ZIP</button>
</div>

<div id="map"></div>

<div id="sidebar" class="sidebar">
    <h3>Registros</h3>
    <input type="text" id="search" placeholder="Buscar..." onkeyup="renderList()" style="width:90%">
    <div id="list-container"></div>
    <button class="btn" onclick="this.parentElement.style.right='-320px'">CERRAR</button>
</div>

<div id="modal" class="modal">
    <div class="card">
        <h3>Detalles</h3>
        <input type="text" id="m-serie" placeholder="Serie (QR/Manual)" style="width:100%; padding:10px; box-sizing:border-box;">
        <button class="btn" onclick="scan()">📷 QR/Barra</button>
        <input type="file" id="m-fotos" accept="image/*" multiple capture="environment" style="margin:10px 0;">
        <button class="btn" style="width:100%" onclick="saveLayer()">GUARDAR</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.20.0"></script>

<script>
    const map = L.map('map').setView([-15.48, -70.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const drawnItems = new L.FeatureGroup().addTo(map);
    new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { marker: true, polyline: true, polygon: true } }).addTo(map);

    let activeLayer;

    // Escáner QR
    async function scan() {
        const reader = new ZXing.BrowserMultiFormatReader();
        const res = await reader.decodeOnceFromVideoDevice(null);
        document.getElementById('m-serie').value = res.text;
    }

    // Dibujo y Edición
    map.on('draw:created', e => {
        activeLayer = e.layer;
        document.getElementById('modal').style.display = 'flex';
    });

    // Guardado y Persistencia (Simulación de IndexedDB con lógica de objeto)
    function saveLayer() {
        activeLayer.myData = {
            serie: document.getElementById('m-serie').value,
            id: Date.now()
        };
        drawnItems.addLayer(activeLayer);
        document.getElementById('modal').style.display = 'none';
        renderList();
    }

    // Lista interactiva
    function renderList() {
        const list = document.getElementById('list-container');
        list.innerHTML = '';
        drawnItems.eachLayer(l => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<p>Serie: ${l.myData?.serie || 'Sin código'}</p>`;
            div.ondblclick = () => map.flyTo(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 18);
            list.appendChild(div);
        });
    }

    // Exportación ZIP (Integrada)
    async function exportData() {
        const zip = new JSZip();
        let csv = "Serie,Lat,Lon\n";
        drawnItems.eachLayer(l => {
            const pos = l.getLatLng ? l.getLatLng() : l.getBounds().getCenter();
            csv += `${l.myData?.serie},${pos.lat},${pos.lng}\n`;
        });
        zip.file("registros.csv", csv);
        const blob = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "Electropuno_Data.zip";
        link.click();
    }
</script>
</body>
</html>
