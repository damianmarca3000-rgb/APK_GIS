<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    
    <style>
        body, html { margin:0; height:100%; font-family: sans-serif; overflow: hidden; }
        #map { flex-grow:1; height: 100vh; }
        .controls { position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 5px; }
        .btn { padding: 10px; background: #004a99; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #f8f9fa; z-index: 2000; transition: 0.3s; padding: 15px; box-shadow: -2px 0 5px rgba(0,0,0,0.3); overflow-y: auto; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .form-card { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
        .img-thumb { width: 70px; height: 70px; object-fit: cover; margin: 5px; border: 1px solid #ccc; }
        .dropdown { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; background: white; }
        summary { padding: 10px; font-weight: bold; cursor: pointer; background: #eee; }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn" onclick="map.locate({setView: true, maxZoom: 17})">📍 GPS</button>
    <button class="btn" onclick="document.getElementById('sidebar').style.right='0'">📋 LISTA</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">📂 KMZ</button>
    <input type="file" id="importFile" multiple accept=".kmz,.kml" style="display:none" onchange="importarKMZ(this.files)">
    <button class="btn" style="background:#28a745;" onclick="exportarZip()">💾 ZIP</button>
</div>

<div id="map"></div>

<div id="sidebar" class="sidebar">
    <button onclick="this.parentElement.style.right='-320px'">Cerrar</button>
    <h3>Capas (TOC)</h3>
    <details class="dropdown" open>
        <summary>✏️ Dibujos</summary>
        <div id="lista-dibujos"></div>
    </details>
    <details class="dropdown" open>
        <summary>📂 KMZ Importados</summary>
        <div id="lista-kmz"></div>
    </details>
</div>

<div id="modal" class="modal">
    <div class="form-card">
        <h3>Registro de Activo</h3>
        <label>Código de Ruta:</label>
        <input type="text" id="m-ruta" style="width:100%; padding:8px; margin-bottom:10px;">
        <label>N° Serie:</label>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="text" id="m-serie" style="flex-grow:1; padding:8px;">
            <button class="btn" onclick="escanear()">📷</button>
        </div>
        <input type="file" id="m-fotos" accept="image/*" multiple capture="environment">
        <div id="preview-fotos" style="display:flex; margin:10px 0;"></div>
        <button class="btn" style="width:100%" onclick="guardar()">GUARDAR</button>
    </div>
</div>

<script>
    const map = L.map('map').setView([-15.48, -70.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    const groupDibujos = L.featureGroup().addTo(map);
    const groupKMZ = L.featureGroup().addTo(map);
    
    new L.Control.Draw({ edit: { featureGroup: groupDibujos }, draw: { marker: true, polyline: true, polygon: true } }).addTo(map);

    let activeLayer;

    // 1. Lógica de Dibujo
    map.on(L.Draw.Event.CREATED, e => {
        activeLayer = e.layer;
        document.getElementById('modal').style.display = 'flex';
    });

    // 2. Escáner
    async function escanear() {
        const reader = new ZXing.BrowserMultiFormatReader();
        const res = await reader.decodeOnceFromVideoDevice(null);
        document.getElementById('m-serie').value = res.text;
    }

    // 3. Guardado
    function guardar() {
        activeLayer.myData = {
            ruta: document.getElementById('m-ruta').value,
            serie: document.getElementById('m-serie').value
        };
        groupDibujos.addLayer(activeLayer);
        document.getElementById('modal').style.display = 'none';
        renderTOC();
    }

    // 4. Árbol de Capas (TOC)
    function renderTOC() {
        const list = document.getElementById('lista-dibujos');
        list.innerHTML = '';
        groupDibujos.eachLayer(l => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span>Ruta: ${l.myData?.ruta || 'N/A'}</span> <button onclick="zoomTo(${l._leaflet_id})">🔍</button>`;
            list.appendChild(div);
        });
    }

    function zoomTo(id) {
        const l = groupDibujos.getLayer(id);
        map.flyTo(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 18);
    }

    // 5. Exportación
    async function exportarZip() {
        const zip = new JSZip();
        let csv = "Ruta,Serie,Lat,Lon\n";
        groupDibujos.eachLayer(l => {
            const pos = l.getLatLng ? l.getLatLng() : l.getBounds().getCenter();
            csv += `${l.myData?.ruta},${l.myData?.serie},${pos.lat},${pos.lng}\n`;
        });
        zip.file("registros.csv", csv);
        const blob = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Electropuno_Data.zip";
        a.click();
    }

    // 6. Importar KMZ (Base)
    async function importarKMZ(files) {
        for(let file of files) {
            const zip = await JSZip.loadAsync(file);
            alert("KMZ cargado: " + file.name);
            renderTOC();
        }
    }
</script>
</body>
</html>
