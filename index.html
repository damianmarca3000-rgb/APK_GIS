<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electropuno Pro GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    <style>
        :root { --primary: #004a99; --accent: #28a745; }
        body { margin:0; height: 100vh; display: flex; flex-direction: column; font-family: 'Segoe UI', sans-serif; }
        #map { flex-grow: 1; z-index: 1; }
        .toolbar { height: 60px; background: var(--primary); display: flex; align-items: center; padding: 0 10px; gap: 10px; color: white; overflow-x: auto; }
        .drawer { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: white; z-index: 9999; box-shadow: -2px 0 10px rgba(0,0,0,0.3); transition: 0.3s; padding: 15px; }
        .card-img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="getLocation()">📍 GPS</button>
    <button onclick="toggleDrawer()">📋 LISTA</button>
    <button onclick="document.getElementById('import').click()">📂 KMZ</button>
    <button onclick="exportarZip()" style="background: var(--accent);">💾 ZIP</button>
    <input type="file" id="import" style="display:none" multiple onchange="importarKMZ(this.files)">
</div>

<div id="map"></div>

<div id="drawer" class="drawer">
    <h3>Gestión de Activos</h3>
    <input type="text" id="search" onkeyup="filtrar()" placeholder="Buscar por serie...">
    <div id="lista"></div>
</div>

<div id="modal" style="display:none; position:fixed; z-index:10000; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; width:90%; max-width:400px; border-radius:8px;">
        <h3>Registrar Elemento</h3>
        <input type="text" id="m-serie" placeholder="Serie (QR/Manual)" style="width:100%; padding:8px;">
        <button onclick="escanear()">📷 Escanear QR</button>
        <input type="file" id="m-fotos" accept="image/*" multiple capture="environment">
        <button class="btn" onclick="guardar()">GUARDAR</button>
    </div>
</div>

<script>
    const map = L.map('map').setView([-15.48, -70.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const drawnItems = new L.FeatureGroup().addTo(map);
    new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { marker: true, polyline: true, polygon: true } }).addTo(map);

    // 1. GPS Real-time
    function getLocation() {
        map.locate({setView: true, maxZoom: 17});
    }

    // 2. Escáner
    async function escanear() {
        const reader = new ZXing.BrowserMultiFormatReader();
        const res = await reader.decodeOnceFromVideoDevice(null);
        document.getElementById('m-serie').value = res.text;
    }

    // 3. Persistencia (IndexedDB mock-up logica)
    // Se recomienda usar localForage para simplificar IndexedDB
    function guardar() {
        // Logica para capturar capas y guardar en IndexedDB
        alert("Guardado localmente en IndexedDB");
    }

    // 4. Drawer & UI
    function toggleDrawer() {
        const d = document.getElementById('drawer');
        d.style.right = d.style.right === '0px' ? '-320px' : '0px';
    }

    // 5. Importacion KMZ
    async function importarKMZ(files) {
        // Implementacion de JSZip para leer archivos .kmz (que son zips de kml)
        for(let file of files) {
            const zip = await JSZip.loadAsync(file);
            const kmlText = await zip.file(/.*\.kml/)[0].async("string");
            // Parsear KML y añadir a drawnItems
        }
    }
</script>
</body>
</html>
