<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body, html { margin:0; padding:0; height: 100%; font-family: sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        #panel { height: 60px; display: flex; gap: 5px; padding: 5px; background: #eee; align-items: center; }
        /* Sidebar y Formulario */
        #sidebar { position:fixed; top:60px; right:-250px; width:250px; height:100%; background:white; z-index:999; transition:0.3s; padding:10px; box-shadow:-2px 0 5px #ccc; }
        #form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; }
        .form-box { background:white; padding:20px; border-radius:10px; width:90%; max-width:300px; }
        input { display:block; width:90%; margin:10px 0; padding:10px; }
    </style>
</head>
<body>

    <div id="panel">
        <button onclick="document.getElementById('importInput').click()">📂 IMP</button>
        <button onclick="descargarKML()">💾 EXP</button>
        <button onclick="document.getElementById('sidebar').style.right = '0'">📋 LISTA</button>
    </div>
    <div id="map"></div>

    <div id="sidebar">
        <h3>Trazos Guardados</h3>
        <button onclick="this.parentElement.style.right = '-250px'">CERRAR</button>
        <ul id="lista-trazos"></ul>
    </div>

    <div id="form-overlay">
        <div class="form-box">
            <h3>Detalles</h3>
            <input type="text" id="codRuta" placeholder="Código de Ruta">
            <input type="text" id="numSerie" placeholder="N° Serie">
            <input type="text" id="fases" placeholder="Fases (A,B,C)">
            <button onclick="guardarDatos()">GUARDAR</button>
        </div>
    </div>

    <input type="file" id="importInput" accept=".kml,.kmz" style="display:none" onchange="procesarArchivo(event)">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        let tempLayer;

        map.on('draw:created', (e) => {
            tempLayer = e.layer;
            document.getElementById('form-overlay').style.display = 'flex';
        });

        function guardarDatos() {
            tempLayer.myData = {
                codigo: document.getElementById('codRuta').value,
                serie: document.getElementById('numSerie').value,
                fases: document.getElementById('fases').value
            };
            drawnItems.addLayer(tempLayer);
            actualizarLista();
            document.getElementById('form-overlay').style.display = 'none';
        }

        function actualizarLista() {
            const lista = document.getElementById('lista-trazos');
            lista.innerHTML = '';
            drawnItems.eachLayer((layer, id) => {
                let li = document.createElement('li');
                li.innerHTML = `Ruta: ${layer.myData?.codigo || 'Sin nombre'}`;
                li.onclick = () => map.fitBounds(layer.getBounds ? layer.getBounds() : L.latLngBounds(layer.getLatLng(), layer.getLatLng()));
                lista.appendChild(li);
            });
        }

        function descargarKML() {
            let placemarks = "";
            drawnItems.eachLayer(l => {
                let d = l.myData || {codigo:'N/A', serie:'N/A', fases:'N/A'};
                let geom = (l instanceof L.Marker) ? `<Point><coordinates>${l.getLatLng().lng},${l.getLatLng().lat},0</coordinates></Point>` : 
                           (l instanceof L.Polygon) ? `<Polygon><outerBoundaryIs><LinearRing><coordinates>${l.getLatLngs()[0].map(p => p.lng+','+p.lat+',0').join(" ")}</coordinates></LinearRing></outerBoundaryIs></Polygon>` :
                           `<LineString><coordinates>${l.getLatLngs().map(p => p.lng+','+p.lat+',0').join(" ")}</coordinates></LineString>`;
                
                placemarks += `<Placemark><ExtendedData><Data name="Ruta"><value>${d.codigo}</value></Data><Data name="Serie"><value>${d.serie}</value></Data><Data name="Fases"><value>${d.fases}</value></Data></ExtendedData>${geom}</Placemark>`;
            });
            const kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${placemarks}</Document></kml>`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}));
            a.download = "inspeccion_" + Date.now() + ".kml";
            a.click();
        }
    </script>
</body>
</html>
