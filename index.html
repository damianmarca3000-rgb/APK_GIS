<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Campo Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { margin:0; display: flex; }
        #map { flex: 1; height: 100vh; }
        #sidebar { width: 300px; padding: 10px; background: #f4f4f4; overflow-y: auto; }
        .item { padding: 5px; border-bottom: 1px solid #ccc; cursor: pointer; }
        .highlight { background: #ffeb3b; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h4>Registro de Trazos</h4>
        <input type="file" id="loadKMZ" accept=".geojson,.json" title="Cargar archivo">
        <div id="lista"></div>
        <button onclick="compartirSeleccionados()">📤 Compartir Seleccionados</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 1. Capa de Electropuno (URL de ejemplo, cambia por la tuya)
        var electroLayer = L.tileLayer.wms("http://192.168.236.107/arcgis/services/Redes/MapServer/WmsServer", {
            layers: '0', format: 'image/png', transparent: true
        }).addTo(map);

        var drawnItems = new L.FeatureGroup().addTo(map);
        var userMarker = L.marker([0,0]).addTo(map);

        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true } }).addTo(map);

        // 2. Ubicación GPS dinámica
        map.on('locationfound', function(e) { userMarker.setLatLng(e.latlng); map.setView(e.latlng, 18); });
        
        // 3. Gestión de Lista y Resaltado
        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            drawnItems.addLayer(layer);
            var id = L.stamp(layer);
            
            var div = document.createElement('div');
            div.className = 'item';
            div.id = 'row-' + id;
            div.innerHTML = `<input type="checkbox" checked> Trazo ${id}`;
            div.onclick = () => {
                document.querySelectorAll('.item').forEach(i => i.classList.remove('highlight'));
                div.classList.add('highlight');
                layer.openPopup();
            };
            document.getElementById('lista').appendChild(div);
            layer.bindPopup("Foto/Nota: <input type='file' accept='image/*'>");
        });

        async function compartirSeleccionados() {
            var features = [];
            drawnItems.eachLayer(layer => {
                var id = L.stamp(layer);
                if (document.querySelector(`#row-${id} input`).checked) features.push(layer.toGeoJSON());
            });
            var blob = new Blob([JSON.stringify({type: "FeatureCollection", features: features})], {type: "application/json"});
            if (navigator.share) {
                await navigator.share({files: [new File([blob], "data.geojson", {type: "application/json"})]});
            } else {
                var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "data.geojson"; a.click();
            }
        }
    </script>
</body>
</html>
