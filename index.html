<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Electropuno Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { margin:0; display: flex; font-family: sans-serif; }
        #sidebar { width: 320px; padding: 15px; background: #f8f9fa; height: 100vh; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.2); z-index: 1000; }
        #map { flex: 1; height: 100vh; }
        .item { padding: 10px; border-bottom: 1px solid #ccc; cursor: pointer; display: flex; align-items: center; gap: 8px; background: white; margin-bottom: 5px; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h4>Trazos de Supervisión</h4>
        <div id="items-container"></div>
        <button onclick="descargarGeoJSON()">💾 Descargar GeoJSON</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        var map = L.map('map').setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Capa WMS Electropuno
        L.tileLayer.wms("http://192.168.236.107/arcgis/services/Redes/MapServer/WmsServer", {
            layers: '0', format: 'image/png', transparent: true
        }).addTo(map);

        var drawnItems = new L.FeatureGroup().addTo(map);
        map.addLayer(drawnItems);

        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            layer.feature = { type: "Feature", properties: { nombre: "Trazo " + (drawnItems.getLayers().length + 1) } };
            drawnItems.addLayer(layer);
            actualizarSidebar();
        });

        function actualizarSidebar() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            drawnItems.eachLayer(layer => {
                const id = L.stamp(layer);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${layer.feature.properties.nombre}</span>`;
                container.appendChild(div);
            });
        }

        function descargarGeoJSON() {
            let features = [];
            drawnItems.eachLayer(layer => {
                let geo = layer.toGeoJSON();
                geo.properties = layer.feature.properties;
                features.push(geo);
            });

            if (features.length === 0) {
                alert("No hay elementos para exportar.");
                return;
            }

            const data = JSON.stringify({type: "FeatureCollection", features: features});
            const blob = new Blob([data], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            
            // Forzar descarga de forma directa
            const a = document.createElement('a');
            a.href = url;
            a.download = "inspeccion_campo.geojson";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
