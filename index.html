<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electropuno Pro - KML</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body, html { margin:0; padding:0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: calc(100vh - 80px); width: 100%; }
        #panel { height: 80px; display: flex; gap: 5px; padding: 5px; background: #eee; z-index: 1000; }
        button { flex: 1; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; font-size: 12px; }
        .btn-loc { background: #007bff; }
        .btn-kml { background: #dc3545; }
        .btn-list { background: #6c757d; }
        
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; color: white; flex-direction: column; }
        #sidebar { position: fixed; top: 0; right: -250px; width: 250px; height: 100%; background: white; z-index: 3000; box-shadow: -2px 0 5px rgba(0,0,0,0.3); padding: 20px; overflow-y: auto; transition: right 0.3s ease; }
        #sidebar.active { right: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <button class="btn-list" onclick="toggleSidebar()">📋 LISTA</button>
        <button class="btn-loc" onclick="map.locate({setView: true, maxZoom: 18})">📍 UBICAR</button>
        <button class="btn-kml" onclick="descargarKML()">💾 KML (PARA ARCMAP)</button>
    </div>

    <div id="sidebar">
        <h3>Trazos</h3>
        <button onclick="toggleSidebar()" style="background:red; width:100%; padding:10px;">Cerrar</button>
        <div id="list-container"></div>
    </div>

    <div id="photo-overlay">
        <h3>Capturar Evidencia</h3>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        <button id="btnTrigger" style="padding: 20px; background: #ffc107; color: black;">📸 ABRIR CÁMARA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        var map = L.map('map', { tap: true }).setView([-15.48, -70.13], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, marker: true } }).addTo(map);

        let currentLayer = null;

        // Función para generar KML compatible con ArcMap
        function descargarKML() {
            let placemarks = "";
            drawnItems.eachLayer(l => {
                let img = l.feature.properties.foto || "";
                let coords = "";
                
                // Extraer coordenadas según sea polígono, línea o punto
                if(l.getLatLng) { 
                    coords = `${l.getLatLng().lng},${l.getLatLng().lat}`;
                } else if(l.getLatLngs) {
                    coords = l.getLatLngs()[0].map(p => `${p.lng},${p.lat}`).join(" ");
                }

                placemarks += `
                <Placemark>
                    <description><![CDATA[<img src="${img}" width="300px" />]]></description>
                    <Point><coordinates>${coords}</coordinates></Point>
                </Placemark>`;
            });

            const kml = `<?xml version="1.0" encoding="UTF-8"?>
            <kml xmlns="http://www.opengis.net/kml/2.2">
                <Document>${placemarks}</Document>
            </kml>`;

            const blob = new Blob([kml], {type: "application/vnd.google-earth.kml+xml"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "inspeccion_electropuno.kml";
            a.click();
        }

        // --- Resto de funciones (toggleSidebar, procesarFoto, etc) igual al código anterior ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); if(document.getElementById('sidebar').classList.contains('active')) actualizarLista(); }
        
        function actualizarLista() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            drawnItems.eachLayer((layer) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `Trazo ${L.stamp(layer)}`;
                div.onclick = () => { map.fitBounds(layer.getBounds ? layer.getBounds() : L.latLngBounds(layer.getLatLng(), layer.getLatLng())); toggleSidebar(); };
                container.appendChild(div);
            });
        }

        map.on(L.Draw.Event.CREATED, function (e) {
            currentLayer = e.layer;
            currentLayer.feature = { properties: { foto: null, fecha: new Date().toLocaleString() } };
            drawnItems.addLayer(currentLayer);
            document.getElementById('photo-overlay').style.display = 'flex';
        });

        document.getElementById('btnTrigger').onclick = () => document.getElementById('cameraInput').click();

        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentLayer.feature.properties.foto = event.target.result;
                    document.getElementById('photo-overlay').style.display = 'none';
                    alert("✅ Foto adjuntada.");
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
